<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Urukundo 🇧🇮 - Dating Burundais</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ce1126" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Urukundo" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="description" content="L'application de rencontre pour les Burundais du monde entier." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      body { font-family: 'Inter', sans-serif; }
      * { -webkit-tap-highlight-color: transparent; }
    </style>
  </head>
  <body class="bg-white">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
    <script>
      // Nettoyer les anciens service workers
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(reg => reg.unregister());
        });
      }
    </script>
  </body>
</html>
